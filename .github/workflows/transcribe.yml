name: 转录无字幕视频

on:
  schedule:
    - cron: '15 1 * * 1-5'   # 北京时间 09:15（UTC 01:15），周一到周五
    - cron: '0 13 * * 1-5'   # 北京时间 21:00（UTC 13:00），周一到周五
  workflow_dispatch:           # 支持手动触发

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          pip install --quiet yt-dlp groq requests bgutil-ytdlp-pot-provider
          # 把 bgutil 插件复制到 yt-dlp 插件目录
          PLUGIN_DIR="$HOME/.local/lib/python3.12/site-packages/yt_dlp_plugins"
          mkdir -p "$PLUGIN_DIR/extractor" "$PLUGIN_DIR/postprocessor"
          BGUTIL_DIR=$(python3 -c "import bgutil_ytdlp_pot_provider; import os; print(os.path.dirname(bgutil_ytdlp_pot_provider.__file__))" 2>/dev/null || echo "")
          if [ -n "$BGUTIL_DIR" ]; then
            echo "bgutil 路径: $BGUTIL_DIR"
            find "$BGUTIL_DIR" -name "*.py" | head -10
          else
            # pip 安装的插件包直接找
            BGUTIL_DIR=$(pip show bgutil-ytdlp-pot-provider 2>/dev/null | grep Location | awk '{print $2}')
            echo "pip location: $BGUTIL_DIR"
            find "$BGUTIL_DIR" -path "*/yt_dlp_plugins*" -name "*.py" 2>/dev/null | head -10
          fi
          node --version
          yt-dlp --version

      - name: 运行转录脚本
        env:
          WORKER_URL:           ${{ secrets.WORKER_URL }}
          GROQ_API_KEY:         ${{ secrets.GROQ_KEY }}
          SUPADATA_KEY:         ${{ secrets.SUPADATA_KEY }}
          WORKER_SECRET:        ${{ secrets.WORKER_SECRET }}
          YOUTUBE_KEY:          ${{ secrets.YOUTUBE_KEY }}
          MAX_DURATION_MIN:     '30'
          MAX_VIDEOS_PER_RUN:   '5'
        run: python scripts/transcribe.py
