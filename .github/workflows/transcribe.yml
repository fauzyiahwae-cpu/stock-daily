name: 转录无字幕视频

on:
  schedule:
    - cron: '15 1 * * 1-5'   # 北京时间 09:15（UTC 01:15），周一到周五
    - cron: '0 13 * * 1-5'   # 北京时间 21:00（UTC 13:00），周一到周五
  workflow_dispatch:           # 支持手动触发

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          pip install --quiet yt-dlp groq requests bgutil-ytdlp-pot-provider
          # 克隆并构建 bgutil server JS 脚本
          git clone --depth=1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git ~/bgutil-ytdlp-pot-provider
          cd ~/bgutil-ytdlp-pot-provider/server
          npm install --silent
          npx tsc --outDir build 2>/dev/null || npm run build 2>/dev/null || true
          ls build/ || true
          cd -
          # 验证
          yt-dlp --verbose --skip-download "https://www.youtube.com/watch?v=dQw4w9WgXcQ" 2>&1 | grep -iE "pot|bgutil" || true
          node --version
          yt-dlp --version

      - name: 运行转录脚本
        env:
          WORKER_URL:           ${{ secrets.WORKER_URL }}
          GROQ_API_KEY:         ${{ secrets.GROQ_KEY }}
          SUPADATA_KEY:         ${{ secrets.SUPADATA_KEY }}
          WORKER_SECRET:        ${{ secrets.WORKER_SECRET }}
          YOUTUBE_KEY:          ${{ secrets.YOUTUBE_KEY }}
          MAX_DURATION_MIN:     '30'
          MAX_VIDEOS_PER_RUN:   '5'
        run: python scripts/transcribe.py
