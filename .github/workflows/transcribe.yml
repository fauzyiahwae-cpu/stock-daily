name: 无字幕视频转录

on:
  schedule:
    # 北京时间 09:15 = UTC 01:15
    - cron: '15 1 * * 1-5'
    # 北京时间 21:00 = UTC 13:00
    - cron: '0 13 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yt-dlp groq requests

      - name: Run transcription
        env:
          WORKER_URL: https://stock-daily.fauzyiahwae.workers.dev
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
        run: python scripts/transcribe.py
