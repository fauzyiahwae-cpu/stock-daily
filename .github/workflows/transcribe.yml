name: 转录无字幕视频

on:
  schedule:
    - cron: '15 1 * * 1-5'   # 北京时间 09:15（UTC 01:15），周一到周五
    - cron: '0 13 * * 1-5'   # 北京时间 21:00（UTC 13:00），周一到周五
  workflow_dispatch:           # 支持手动触发

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          pip install --quiet yt-dlp groq requests
          yt-dlp --version

      - name: 运行转录脚本
        env:
          WORKER_URL:           ${{ secrets.WORKER_URL }}
          GROQ_API_KEY:         ${{ secrets.GROQ_KEY }}
          SUPADATA_KEY:         ${{ secrets.SUPADATA_KEY }}
          WORKER_SECRET:        ${{ secrets.WORKER_SECRET }}
          YOUTUBE_KEY:          ${{ secrets.YOUTUBE_KEY }}
          MAX_DURATION_MIN:     '30'
          MAX_VIDEOS_PER_RUN:   '5'
        run: python scripts/transcribe.py
