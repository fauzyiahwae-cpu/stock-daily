name: 转录无字幕视频

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 北京时间 08:00，周一到周五（UTC 00:00）
  workflow_dispatch:          # 支持手动触发

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          pip install --quiet yt-dlp
          yt-dlp --version

      - name: 运行转录脚本
        env:
          WORKER_URL:          ${{ secrets.WORKER_URL }}
          YOUTUBE_KEY:         ${{ secrets.YOUTUBE_KEY }}
          GROQ_KEY:            ${{ secrets.GROQ_KEY }}      # Groq 免费 Whisper（主）
          OPENAI_KEY:          ${{ secrets.OPENAI_KEY }}    # OpenAI fallback（可不填）
          SUPADATA_KEY:        ${{ secrets.SUPADATA_KEY }}
          MAX_DURATION_MIN:    '30'
          MAX_VIDEOS_PER_RUN:  '3'
        run: python scripts/transcribe.py
