name: 转录无字幕视频

on:
  schedule:
    - cron: '15 1 * * 1-5'   # 北京时间 09:15（UTC 01:15），周一到周五
    - cron: '0 13 * * 1-5'   # 北京时间 21:00（UTC 13:00），周一到周五
  workflow_dispatch:           # 支持手动触发

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          pip install --quiet yt-dlp groq requests bgutil-ytdlp-pot-provider
          # 初始化 bgutil JS 脚本（必须先运行才能生成 po_token）
          python3 -c "
import subprocess, os
result = subprocess.run(
    ['node', os.path.expanduser('~/.local/lib/python3.12/site-packages/bgutil_ytdlp_pot_provider/server/build/generate_once.js'), '--help'],
    capture_output=True, text=True
)
print('bgutil js:', result.stdout[:200], result.stderr[:200])
" 2>/dev/null || true
          # 用 yt-dlp 跑一次看 pot providers
          yt-dlp --verbose --skip-download "https://www.youtube.com/watch?v=dQw4w9WgXcQ" 2>&1 | grep -E "pot|POT|bgutil|JS runtime" || true
          node --version
          yt-dlp --version

      - name: 运行转录脚本
        env:
          WORKER_URL:           ${{ secrets.WORKER_URL }}
          GROQ_API_KEY:         ${{ secrets.GROQ_KEY }}
          SUPADATA_KEY:         ${{ secrets.SUPADATA_KEY }}
          WORKER_SECRET:        ${{ secrets.WORKER_SECRET }}
          YOUTUBE_KEY:          ${{ secrets.YOUTUBE_KEY }}
          MAX_DURATION_MIN:     '30'
          MAX_VIDEOS_PER_RUN:   '5'
        run: python scripts/transcribe.py
