<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股日报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c0f;--bg2:#111418;--bg3:#181c22;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#e8eaed;--text2:#8b9099;--text3:#4a5060;
    --up:#00c896;--down:#ff5252;--accent:#4f9eff;--gold:#f0b429;
    --vA:#00c896;--vB:#ff5252;--vC:#f0b429;--vD:#4a5060;
    --mono:'JetBrains Mono',monospace;
    --sans:'Noto Sans TC',sans-serif;
    --serif:'Playfair Display',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}

  header{border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,12,15,.96);backdrop-filter:blur(12px);z-index:100}
  .logo{font-family:var(--serif);font-size:20px}.logo span{color:var(--gold)}
  .hdr-r{display:flex;align-items:center;gap:12px}
  .upd{font-family:var(--mono);font-size:10px;color:var(--text3)}
  .btn{font-family:var(--mono);font-size:11px;cursor:pointer;border-radius:4px;padding:5px 14px;transition:all .2s;border:1px solid var(--border2);background:transparent;color:var(--text2)}
  .btn:hover{background:var(--bg3);color:var(--text)}
  .btn.pri{background:var(--accent);color:#fff;border-color:transparent}
  .btn.pri:hover{opacity:.85}
  .btn:disabled{opacity:.4;pointer-events:none}

  .main{padding:24px 28px;max-width:1440px;margin:0 auto}
  .sec{margin-bottom:36px}
  .sec-title{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .ldot{display:inline-block;width:6px;height:6px;background:var(--up);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sp{display:inline-block;width:11px;height:11px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}

  /* CONFIG BAR */
  .cfg-bar{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .cfg-lbl{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap}
  .cfg-in{flex:1;min-width:260px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 10px;outline:none;transition:border-color .2s}
  .cfg-in:focus{border-color:var(--accent)}

  /* QUOTES */
  .q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
  .q-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 14px 12px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s}
  .q-card:hover{border-color:var(--border2);transform:translateY(-1px)}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,transparent)}
  .q-card.up{--ac:var(--up)}.q-card.down{--ac:var(--down)}
  .q-sym{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.05em}
  .q-price{font-family:var(--mono);font-size:22px;margin:5px 0 3px;color:var(--text)}
  .q-chg{font-family:var(--mono);font-size:12px;font-weight:500}
  .q-chg.up{color:var(--up)}.q-chg.down{color:var(--down)}
  .q-hl{display:flex;gap:10px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--text3)}
  .q-hl span{color:var(--text2)}
  .q-err{font-family:var(--mono);font-size:11px;color:var(--down);margin-top:6px}

  /* ANALYSIS */
  .a-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
  .a-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .a-hdr{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
  .a-av{width:34px;height:34px;border-radius:50%;background:var(--bg3);flex-shrink:0;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3)}
  .a-name{font-size:13px;font-weight:500}
  .a-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:1px}
  .a-body{padding:14px 16px}
  .a-vtags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .a-vtag{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 8px;display:flex;align-items:center;gap:5px}
  .a-vtag a{color:var(--text2);text-decoration:none}.a-vtag a:hover{color:var(--accent)}
  .cdot{width:5px;height:5px;border-radius:50%;background:var(--up);display:inline-block}
  .ncdot{width:5px;height:5px;border-radius:50%;background:var(--text3);display:inline-block}
  .a-slbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin:14px 0 6px;padding:4px 8px;background:rgba(79,158,255,0.08);border-left:2px solid var(--accent);border-radius:0 3px 3px 0}
  .a-slbl:first-child{margin-top:4px}
  .a-txt{font-size:12px;color:var(--text2);line-height:1.75;white-space:pre-wrap}
  .a-vpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .a-vp{font-family:var(--mono);font-size:10px;border-radius:4px;padding:2px 8px;display:flex;align-items:center;gap:4px}
  .a-vp.A{background:rgba(0,200,150,.12);color:var(--vA);border:1px solid rgba(0,200,150,.25)}
  .a-vp.B{background:rgba(255,82,82,.12);color:var(--vB);border:1px solid rgba(255,82,82,.25)}
  .a-vp.C{background:rgba(240,180,41,.12);color:var(--vC);border:1px solid rgba(240,180,41,.25)}
  .a-novid{font-family:var(--mono);font-size:11px;color:var(--text3);padding:8px 0}
  .a-err{padding:12px 16px;font-family:var(--mono);font-size:11px;color:var(--down)}
  .a-ld{padding:20px 16px;font-family:var(--mono);font-size:11px;color:var(--text3)}

  /* VOTE TABLE */
  .vtbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
  .vtbl th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-weight:400;padding:6px 14px;text-align:left;border-bottom:1px solid var(--border)}
  .vtbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
  .vtbl tr:last-child td{border-bottom:none}
  .vtbl tr:hover td{background:var(--bg3)}
  .vsym{font-weight:500;color:var(--text);letter-spacing:.04em}
  .vpill{font-size:11px;border-radius:4px;padding:2px 10px;min-width:36px;text-align:center;display:inline-block}
  .vpill.A{background:rgba(0,200,150,.15);color:var(--vA)}
  .vpill.B{background:rgba(255,82,82,.15);color:var(--vB)}
  .vpill.C{background:rgba(240,180,41,.15);color:var(--vC)}
  .vpill.D{background:rgba(74,80,96,.12);color:var(--vD)}
  .vverdict{font-size:11px;font-weight:500;padding:2px 10px;border-radius:4px;display:inline-block}
  .vverdict.A{background:rgba(0,200,150,.18);color:var(--vA)}
  .vverdict.B{background:rgba(255,82,82,.18);color:var(--vB)}
  .vverdict.C{background:rgba(240,180,41,.18);color:var(--vC)}
  .vverdict.D{background:rgba(74,80,96,.15);color:var(--vD)}

  footer{border-top:1px solid var(--border);padding:14px 28px;font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  @media(max-width:640px){
    header{padding:12px 14px}
    .main{padding:10px}
    .q-grid{grid-template-columns:1fr;gap:8px}
    .a-grid{grid-template-columns:1fr}
    .logo{font-size:14px}
  }
  @media(max-width:360px){
    .q-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header>
  <div class="logo">美股财经<span>日报</span> <span style="font-size:13px;color:var(--text3);font-family:var(--mono);font-weight:400">v2.0</span></div>
  <div class="hdr-r">
    <span class="upd" id="updTime">未更新</span>
    <button class="btn" id="btnQuotes" onclick="loadQuotesAll()">↻ 行情</button>
    <button class="btn" id="btnGex" onclick="loadGex(getWorker())">↻ 期权墙</button>
    <button class="btn pri" id="btnAnalysis" onclick="loadAnalysisBtn()">↻ 分析</button>
    <button class="btn" id="btnForce" onclick="forceRefresh()" title="清除缓存重新全量分析">强制刷新</button>
    <button class="btn" onclick="openSettings()" title="管理标的和博主">⚙ 设置</button>
  </div>
</header>

<div class="main">

  <div class="cfg-bar">
    <span class="cfg-lbl">Worker 地址</span>
    <input class="cfg-in" id="workerUrl" placeholder="https://stock-daily.yourname.workers.dev">
    <button class="btn" onclick="saveWorker()">保存</button>
  </div>

  <div class="sec">
    <div class="sec-title"><span class="ldot"></span>实时行情</div>
    <div class="q-grid" id="quoteGrid"><div style="color:var(--text3);font-family:var(--mono);font-size:11px"><span class="sp"></span> 点击更新...</div></div>
  </div>

  <div class="sec">
    <div id="gexSectionTitle" style="display:none"></div>
    <div id="gexGrid" style="display:none"></div>

    <div class="sec-title">博主观点分析</div>
    <div class="a-grid" id="analysisGrid"><div style="color:var(--text3);font-family:var(--mono);font-size:11px">点击更新...</div></div>
  </div>

  <div class="sec">
    <div class="sec-title">标的投票委员会</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto">
      <table class="vtbl" id="voteTable">
        <thead id="voteThead">
          <tr><th>标的</th><th>综合结论</th></tr>
        </thead>
        <tbody id="voteTbody"><tr><td colspan="2" style="text-align:center;color:var(--text3);font-family:var(--mono);font-size:11px;padding:20px">点击更新...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<footer>
  <span>数据来源：Finnhub · YouTube Data API v3 · OpenAI</span>
  <span>仅供参考，不构成投资建议</span>
</footer>

<script>
const SYMBOLS=['QQQ','SPY','YINN','VXX','SVIX','SOXL','MSFT','NVDA','UGL','META'];
const SYM_DISPLAY={'QQQ':'QQQ (.NDX)','SPY':'SPY (.SPX)'};
const VL={A:'看涨',B:'看跌',C:'观望',D:'未提及'};
function symLabel(s){return SYM_DISPLAY[s]||s;}
// 博主列表（与第二模块保持一致，由API返回动态更新）
let BLOGGERS = [];

function getWorker(){return localStorage.getItem('workerUrl')||'';}

// ── 配置管理 ──────────────────────────────────────────────────
let _config = null;

async function loadConfig() {
  const w = getWorker();
  if (!w) return;
  try {
    const r = await fetch(w + '/api/config');
    const d = await r.json();
    _config = d.config;
    if (_config.symbols) { SYMBOLS.length=0; _config.symbols.forEach(s=>SYMBOLS.push(s)); }
  } catch(e) { console.warn('config load failed', e); }
}

function openSettings() {
  if (!_config) { alert('请先点击任意刷新按钮加载配置'); return; }
  renderSymbolList(); renderBloggerList();
  document.getElementById('settingsModal').style.display = 'block';
}
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

function renderSymbolList() {
  const syms = _config.symbols || SYMBOLS;
  document.getElementById('symbolList').innerHTML = syms.map(s =>
    '<div style="display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px">' +
    '<span style="font-family:var(--mono);font-size:12px;color:var(--text1)">' + s + '</span>' +
    '<button onclick="removeSymbol(\'' + s + '\')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0 2px">✕</button></div>'
  ).join('');
}

function renderBloggerList() {
  const bloggers = _config.bloggers || [];
  document.getElementById('bloggerList').innerHTML = bloggers.map((b, i) =>
    '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">' +
    '<div style="flex:1;min-width:0">' +
      '<div style="font-size:12px;color:var(--text1)">' + b.name + '</div>' +
      '<div style="font-size:10px;color:var(--text3);font-family:var(--mono)">' + b.channelId + '</div>' +
    '</div>' +
    '<button onclick="removeBlogger(' + i + ')" style="background:none;border:none;color:var(--down);cursor:pointer;font-size:14px">✕</button>' +
    '</div>'
  ).join('');
}

function addSymbol() {
  const input = document.getElementById('newSymbol');
  const sym = input.value.trim().toUpperCase();
  if (!sym) return;
  if (!_config.symbols) _config.symbols = [...SYMBOLS];
  if (_config.symbols.includes(sym)) { alert(sym + ' 已存在'); return; }
  _config.symbols.push(sym);
  input.value = '';
  renderSymbolList();
}

function removeSymbol(sym) {
  if (!_config.symbols) _config.symbols = [...SYMBOLS];
  if (_config.symbols.length <= 1) { alert('至少保留1个标的'); return; }
  _config.symbols = _config.symbols.filter(s => s !== sym);
  renderSymbolList();
}

function addBlogger() {
  const idInput = document.getElementById('newBloggerId');
  const nameInput = document.getElementById('newBloggerName');
  const channelId = idInput.value.trim();
  const name = nameInput.value.trim();
  if (!channelId || !name) { alert('请填写 Channel ID 和显示名称'); return; }
  if (!channelId.startsWith('UC')) { alert('Channel ID 应以 UC 开头'); return; }
  if (!_config.bloggers) _config.bloggers = [];
  if (_config.bloggers.some(b => b.channelId === channelId)) { alert('该频道已存在'); return; }
  _config.bloggers.push({ channelId, name });
  idInput.value = ''; nameInput.value = '';
  renderBloggerList();
}

function removeBlogger(idx) {
  if (!_config.bloggers) return;
  if (_config.bloggers.length <= 1) { alert('至少保留1个博主'); return; }
  _config.bloggers.splice(idx, 1);
  renderBloggerList();
}

async function saveSettings() {
  const w = getWorker();
  if (!w) { alert('请先保存 Worker 地址'); return; }
  try {
    const r = await fetch(w + '/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbols: _config.symbols, bloggers: _config.bloggers })
    });
    const d = await r.json();
    if (d.saved) {
      SYMBOLS.length = 0;
      (_config.symbols || []).forEach(s => SYMBOLS.push(s));
      closeSettings();
      alert('配置已保存！博主变更请点"强制刷新"重新分析。');
    }
  } catch(e) { alert('保存失败：' + e.message); }
}

// ── 各模块独立刷新 ────────────────────────────────────────────
async function loadQuotesAll() {
  const w = getWorker();
  if (!w) { alert('请先填写 Worker 地址并保存'); return; }
  const btn = document.getElementById('btnQuotes');
  btn.disabled=true; btn.textContent='刷新中...';
  await Promise.all([loadQuotes(w), loadQuotesExt(w)]);
  btn.disabled=false; btn.textContent='↻ 行情';
}

async function loadAnalysisBtn() {
  const w = getWorker();
  if (!w) { alert('请先填写 Worker 地址并保存'); return; }
  const btn = document.getElementById('btnAnalysis');
  btn.disabled=true; btn.textContent='分析中...';
  document.getElementById('updTime').textContent = new Date().toLocaleString('zh-CN',{hour12:false});
  await loadAnalysis(w);
  btn.disabled=false; btn.textContent='↻ 分析';
}

async function forceRefresh(){
  const w = getWorker();
  if (!w) return;
  const btn = document.getElementById('btnForce');
  btn.disabled=true; btn.textContent='清除中...';
  try {
    await fetch(w + '/api/cache', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channels: [], cleared: true })
    });
  } catch {}
  clearLocalCache();
  btn.disabled=false; btn.textContent='强制刷新';
  await loadAnalysisBtn();
}

function saveWorker(){
  const v=document.getElementById('workerUrl').value.trim().replace(/\/$/,'');
  if(v){localStorage.setItem('workerUrl',v);alert('已保存');}
}

window.onload=async()=>{
  const s=getWorker();
  if(s){ document.getElementById('workerUrl').value=s; await loadConfig(); }
};

/* ── QUOTES ── */
async function loadQuotes(w){
  const g=document.getElementById('quoteGrid');
  g.innerHTML='<div style="color:var(--text3);font-family:var(--mono);font-size:11px"><span class="sp"></span> 加载行情...</div>';
  try{
    const r=await fetch(w+'/api/quotes');
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    g._lastQuotes=d; // 缓存供 GEX/延伸盘更新后重新渲染
    g.innerHTML=d.map(qCard).join('');
  }catch(e){g.innerHTML=`<div style="color:var(--down);font-family:var(--mono);font-size:11px">行情失败：${e.message}</div>`;}
}

async function loadGex(w) {
  const g = document.getElementById('gexGrid');
  if (!g) return;
  try {
    const r = await fetch(w + '/api/gex');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.gex) return;
    g.innerHTML = d.gex.map(gexCard).join('');
  } catch(e) {
    g.innerHTML = '<div style="color:var(--text3);font-family:var(--mono);font-size:11px">伽马墙数据获取失败：' + e.message + '</div>';
  }
}

/* ── QUOTES EXT（夜盘）── */
// 全局 GEX 数据缓存
let _gexData = {};

async function loadQuotesExt(w){
  try{
    const r=await fetch(w+'/api/quotes-ext');
    if(!r.ok)return;
    const d=await r.json();
    if(!d.quotes)return;
    // 存到全局，供 qCard 合并
    d.quotes.forEach(q=>{ if(q.ok) _extData[q.symbol]=q; });
    // 重新渲染行情卡片
    const quoteGrid=document.getElementById('quoteGrid');
    if(quoteGrid&&quoteGrid._lastQuotes){
      quoteGrid.innerHTML=quoteGrid._lastQuotes.map(q=>qCard(q)).join('');
    }
  }catch{}
}

async function loadGex(w){
  const g=document.getElementById('gexGrid');
  if(!g)return;
  try{
    const r=await fetch(w+'/api/gex');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(!d.gex)return;
    // 存全局 GEX 缓存
    d.gex.forEach(g=>{ _gexData[g.symbol]=g; });
    g.style.display='none'; // 隐藏独立GEX区域（已合并到行情卡片）
    // 重新渲染行情卡片合并GEX
    const quoteGrid=document.getElementById('quoteGrid');
    if(quoteGrid&&quoteGrid._lastQuotes){
      quoteGrid.innerHTML=quoteGrid._lastQuotes.map(q=>qCard(q)).join('');
    }
  }catch(e){
    g.innerHTML='<div style="color:var(--text3);font-family:var(--mono);font-size:11px">伽马墙数据获取失败：'+e.message+'</div>';
  }
}

// 全局延伸盘数据缓存
let _extData = {};

function f(n,d=2){return(n!=null&&!isNaN(n))?Number(n).toFixed(d):'--';}
function fp(n){return(n!=null&&!isNaN(n))?(n>=0?'+':'')+Number(n).toFixed(2)+'%':'--';}

function qCard(q){
  if(!q.ok)return`<div class="q-card"><div class="q-sym">${symLabel(q.symbol)}</div><div class="q-err">无数据</div></div>`;
  const u=q.change>=0,c=u?'up':'down',a=u?'▲':'▼';

  // 延伸盘数据
  const ext=_extData[q.symbol];
  const session=ext?.session||'regular';
  const sessionLabel={'pre':'盘前','post':'盘后','overnight':'夜盘','regular':'正盘','closed':''}[session]||'';
  const sessionColor={'pre':'var(--accent)','post':'var(--accent)','overnight':'#a78bfa','regular':'var(--up)','closed':'var(--text3)'}[session]||'var(--text3)';

  // 延伸盘价格行（只在非正盘时显示）
  let extRow='';
  if(ext?.extPrice!=null&&session!=='regular'&&session!=='closed'){
    const ec=ext.changePct>=0?'var(--up)':'var(--down)';
    const ea=ext.changePct>=0?'▲':'▼';

  return`<div class="q-card ${c}">

    </div>
    <div class="q-price">$${f(q.price)}</div>
    <div class="q-chg ${c}">${a} ${f(Math.abs(q.change))} ${fp(q.changePct)}</div>
    <div class="q-hl" style="margin-top:6px;font-size:11px;color:var(--text3);font-family:var(--mono);display:grid;grid-template-columns:auto auto;gap:1px 16px;line-height:1.8">

async function loadCache(w) {

    if (!r.ok) return null;
    const d = await r.json();
    // 严格验证：必须有博主数据且有分析结果
    if (d.hit && d.data && Array.isArray(d.data.channels) && d.data.channels.length > 0) {
      const hasRealData = d.data.channels.some(ch => ch.analysis && ch.analysis.votes);
      if (hasRealData) return d.data;
    }
  } catch {}
  return null;
}
async function saveCache(w, data) {

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)

function clearLocalCache() {

    .forEach(k => localStorage.removeItem(k));

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 字幕请求（supadata.ai，带重试和退避）
async function fetchCaption(videoId, retry=4) {
  const url = 'https://api.supadata.ai/v1/youtube/transcript?url='
    + encodeURIComponent('https://www.youtube.com/watch?v=' + videoId) + '&text=true';
  const delays = [0, 3000, 6000, 10000];
  for (let i = 0; i < retry; i++) {
    try {
      if (delays[i]) await sleep(delays[i]);
      const r = await fetch(url, { headers: { 'x-api-key': SUPADATA_KEY } });
      if (r.status === 429) { await sleep(10000); continue; }
      if (r.status === 404) return null;
      if (!r.ok) { await sleep(3000); continue; }
      const d = await r.json();
      if (d.availableLangs && d.availableLangs.length === 0) return null;
      const raw = typeof d.content === 'string' ? d.content
        : Array.isArray(d.content) ? d.content.map(t => t.text).join(' ') : null;
      if (raw && raw.length > 50) return raw;
    } catch { await sleep(3000); }
  }
  return null;
}

function cleanCaptionClient(raw) {
  const adWords = ['moomoo','富途','老虎证券','盈透','tastytrade','webull',
    '开户','入金','佣金','手续费','领取','奖励','礼卡','亚马逊','年化利息',
    '现金奖励','置顶评论','描述栏','subscribe','订阅','点赞','关注频道'];

  // 检测是否是每字加空格的格式（ASR字幕，空格占比>30%）
  const spaceRatio = (raw.match(/ /g)||[]).length / raw.length;
  let text = raw;
  if (spaceRatio > 0.3) {
    // 每字有空格，去掉空格合并
    text = raw.replace(/ /g, '');
    // 空格字幕通常没有句号，是一整段，直接过滤广告词后返回
    const hasNoSentence = text.split('。').length <= 2;
    if (hasNoSentence) {
      // 只过滤包含广告词的片段，不做句级过滤
      let clean = text;
      adWords.forEach(w => {
        // 找到广告词位置，删除前后50字范围内的内容
        let idx = clean.indexOf(w);
        while (idx !== -1) {
          const start = Math.max(0, idx - 20);
          const end = Math.min(clean.length, idx + w.length + 20);
          clean = clean.slice(0, start) + clean.slice(end);
          idx = clean.indexOf(w);
        }
      });
      return clean.slice(0, 6000);
    }
  }

  // 正常字幕：按句号分割过滤
  const skipStart=['嗯','啊','哦','好的','对的','那么','所以呢','好了','就是说','我们来看','大家好','欢迎回来','今天我们'];
  const lines = text.split('。').map(s=>s.trim()).filter(s=>s.length>2)
    .filter(l=>!adWords.some(w=>l.includes(w)))
    .filter(l=>!skipStart.some(w=>l.startsWith(w)));

  const deduped=[];
  for(const l of lines){
    const last=deduped[deduped.length-1]||'';
    if(last&&(last.includes(l)||l.includes(last)||(l.length>10&&last.slice(0,12)===l.slice(0,12))))continue;
    deduped.push(l);
  }

  const result = deduped.join('。').slice(0,6000);
  // 兜底：清洗后内容太少则用原始文本
  if (result.length < 100) return text.slice(0, 6000);
  return result;
}

function buildVotesClient(channels) {
  const tally={};
  for(const sym of SYMBOLS) tally[sym]={A:0,B:0,C:0,D:0};
  for(const ch of channels){
    // 无视频或无字幕的博主，所有标的强制记 D
    const hasAnalysis = ch.analysis && ch.analysis.votes && !ch.analysis.noVideo && !ch.analysis.noCaption;
    const v = hasAnalysis ? ch.analysis.votes : {};
    for(const sym of SYMBOLS){
      const raw = v[sym];
      // AI 只有明确输出 A/B/C 才采用，否则一律 D
      const vote = ['A','B','C'].includes((raw||'').toUpperCase()) ? raw.toUpperCase() : 'D';
      tally[sym][vote]++;
    }
  }
  return tally;
}

function aCardSkeleton(ch, status) {
  const name=ch.channelName||ch.handle;
  const av=ch.avatar
    ?'<img class="a-av" src="'+ch.avatar+'" alt="'+name+'">'
    :'<div class="a-av">'+(name[0]||'?')+'</div>';
  const sub=status||((!ch.videos||ch.videos.length===0)?'今日暂无视频':'获取中...');
  return '<div class="a-hdr">'+av+'<div><div class="a-name">'+name+'</div><div class="a-sub">'+sub+'</div></div></div>';
}

async function analyzeChannel(w, ch, el) {
  // 串行抓字幕+AI分析，返回完整result
  if(!ch.videos||ch.videos.length===0) return {...ch,analysis:null};

  if(el)el.innerHTML=aCardSkeleton(ch,'字幕抓取中...');
  const vids=[];
  for(const v of ch.videos.slice(0,3)){
    const raw=await fetchCaption(v.videoId);
    const caption=raw?cleanCaptionClient(raw):null;
    vids.push({...v,caption,hasCaption:!!caption});
    await sleep(2000);
  }
  await sleep(1000);

  // 字幕太短（<200字）视为无效，通常是Shorts，跳过分析
  const totalCaption = vids.filter(v=>v.caption).map(v=>v.caption).join('').length;
  if(!vids.some(v=>v.hasCaption) || totalCaption < 200){
    const result={...ch,videos:vids,analysis:{noCaption:true}};
    if(el)el.innerHTML=aCard(result);
    return result;
  }

  if(el)el.innerHTML=aCardSkeleton(ch,'AI 分析中...');
  try{
    const ar=await fetch(w+'/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({channelId:ch.channelId||ch.handle,displayName:ch.channelName,videos:vids})
    });
    const ad=await ar.json();
    const result={...ch,videos:vids,analysis:ad.analysis||{noCaption:true}};
    if(el)el.innerHTML=aCard(result);
    return result;
  }catch{
    const result={...ch,videos:vids,analysis:null,error:'AI分析失败'};
    if(el)el.innerHTML=aCard(result);
    return result;
  }
}

async function loadAnalysis(w){
  const g=document.getElementById('analysisGrid');
  const tb=document.getElementById('voteTbody');

  // 1. 先拉今日最新视频列表
  g.innerHTML='<div style="color:var(--text3);font-family:var(--mono);font-size:11px"><span class="sp"></span> 获取今日视频列表...</div>';
  tb.innerHTML='<tr><td colspan="2" style="text-align:center;color:var(--text3);font-family:var(--mono);font-size:11px;padding:20px">等待分析...</td></tr>';

  let freshChannels;
  try{
    const r=await fetch(w+'/api/analysis');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(!d.channels)throw new Error('数据格式错误');
    freshChannels=d.channels;
  }catch(e){
    g.innerHTML='<div style="color:var(--down);font-family:var(--mono);font-size:11px">失败：'+e.message+'</div>';
    return;
  }

  // 2. 读取 KV 缓存
  g.innerHTML='<div style="color:var(--text3);font-family:var(--mono);font-size:11px"><span class="sp"></span> 检查今日缓存...</div>';
  const cached = await loadCache(w);

  // 3. 判断增量：哪些频道有新视频但缓存里没有分析
  const cachedMap = {};
  if(cached){
    cached.channels.forEach(ch => { cachedMap[ch.channelId||ch.handle] = ch; });
  }

  const needAnalysis = freshChannels.filter(ch => {
    // 无视频 → 不需要分析
    if(!ch.videos||ch.videos.length===0) return false;
    const cid = ch.channelId||ch.handle;
    const prev = cachedMap[cid];
    // 缓存里没有 → 需要分析
    if(!prev) return true;
    // 缓存里有但分析失败/无字幕 → 需要重新分析
    if(!prev.analysis||prev.analysis.noCaption||prev.analysis.error) return true;
    // 对比视频ID：有新视频 → 需要分析
    const freshIds = (ch.videos||[]).map(v=>v.videoId).sort().join(',');
    const cachedIds = (prev.videos||[]).map(v=>v.videoId).sort().join(',');
    return freshIds !== cachedIds;
  });

  // 4. 如果没有增量，直接用缓存渲染
  if(cached && needAnalysis.length === 0){
    // 用最新视频列表更新无视频的博主状态，其余用缓存
    const merged = freshChannels.map(ch => {
      const cid = ch.channelId||ch.handle;
      return cachedMap[cid] || ch;
    });
    g.innerHTML=merged.map(aCard).join('');
    BLOGGERS=merged.map(ch=>ch.channelName||ch.handle);
    renderVoteTable(merged,buildVotesClient(merged));
    document.getElementById('updTime').textContent += ' ✓ 已缓存';
    return;
  }

  // 5. 有增量：先渲染框架（缓存的直接展示，新的显示loading）
  const allResults = freshChannels.map(ch => {
    const cid = ch.channelId||ch.handle;
    return cachedMap[cid] || {...ch, analysis: null};
  });

  g.innerHTML=freshChannels.map(ch=>{
    const cid=(ch.channelId||ch.handle).replace(/[^a-zA-Z0-9]/g,'_');
    const cached = cachedMap[ch.channelId||ch.handle];
    if(cached && cached.analysis && !cached.analysis.noCaption) {
      return '<div class="a-card" id="ch-'+cid+'">'+aCard(cached)+'</div>';
    }
    return '<div class="a-card" id="ch-'+cid+'">'+aCardSkeleton(ch)+'</div>';
  }).join('');

  // 6. 只分析增量频道
  const newCount = needAnalysis.length;
  document.getElementById('updTime').textContent += ' ('+newCount+'个新视频待分析)';

  for(const ch of needAnalysis){
    const cid=(ch.channelId||ch.handle).replace(/[^a-zA-Z0-9]/g,'_');
    const el=document.getElementById('ch-'+cid);
    const result = await analyzeChannel(w, ch, el);
    // 更新 allResults 对应位置
    const idx = allResults.findIndex(r=>(r.channelId||r.handle)===(ch.channelId||ch.handle));
    if(idx>=0) allResults[idx]=result;
    // 实时更新投票表
    renderVoteTable(allResults,buildVotesClient(allResults));
  }

  // 保存到 KV 缓存
  BLOGGERS=allResults.map(ch=>ch.channelName||ch.handle);
  renderVoteTable(allResults,buildVotesClient(allResults));
  const hasAnyAnalysis=allResults.some(ch=>ch.analysis&&ch.analysis.votes);
  if(hasAnyAnalysis){
    await saveCache(w,{channels:allResults});
    clearLocalCache();
  }
}
function ago(iso){
  if(!iso)return'';
  const d=(Date.now()-new Date(iso))/1000;
  if(d<3600)return Math.floor(d/60)+'分钟前';
  if(d<86400)return Math.floor(d/3600)+'小时前';
  return Math.floor(d/86400)+'天前';
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parseSummary(txt){
  const r={events:'',market:'',stocks:''};
  if(!txt)return r;
  let cur='';
  for(const l of txt.split('\n')){
    if(/^0[.、．]/.test(l)){cur='';continue;}
    if(/^1[.、．]|事件|重大|财经事件/i.test(l)){cur='events';continue;}
    if(/^2[.、．]|大盘|大类|市场/i.test(l)){cur='market';continue;}
    if(/^3[.、．]|个股/i.test(l)){cur='stocks';continue;}
    if(/^4[.、．]|投票|json/i.test(l)){cur='';continue;}
    if(l.includes('```')){cur='';continue;}
    if(cur&&l.trim())r[cur]+=l+'\n';
  }
  return r;
}
function aCard(ch){
  const name=ch.channelName||ch.handle;
  const vcnt=(ch.videos||[]).length;
  const av=ch.avatar
    ?`<img class="a-av" src="${ch.avatar}" alt="${name}">`
    :`<div class="a-av">${name[0]}</div>`;

  // 视频来源链接（小字，放在header副标题）
  const vlinks=(ch.videos||[]).map(v=>
    `<a href="https://www.youtube.com/watch?v=${v.videoId}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-size:10px;font-family:var(--mono)">${v.title.slice(0,20)}${v.title.length>20?'…':''}</a>`
  ).join('<span style="color:var(--text3);margin:0 4px">·</span>');

  if(ch.error)return`<div class="a-card">
    <div class="a-hdr">${av}<div><div class="a-name">${name}</div></div></div>
    <div class="a-err">加载失败：${ch.error}</div>
  </div>`;

  if(!ch.analysis||ch.analysis.noVideo)return`<div class="a-card">
    <div class="a-hdr">${av}<div><div class="a-name">${name}</div><div class="a-sub">今日暂无视频</div></div></div>
  </div>`;
  if(ch.analysis&&ch.analysis.noCaption)return`<div class="a-card">
    <div class="a-hdr">${av}<div><div class="a-name">${name}</div><div class="a-sub" style="color:var(--text3)">视频无字幕，跳过分析</div></div></div>
  </div>`;

  const{summary='',briefSummary='',votes={}}=ch.analysis;
  const s=parseSummary(summary);
  const pills=Object.entries(votes).filter(([,v])=>v!=='D').map(([sym,v])=>`<div class="a-vp ${v}">${symLabel(sym)} ${VL[v]}</div>`).join('');

  return`<div class="a-card">
    <div class="a-hdr">
      ${av}
      <div style="flex:1;min-width:0">
        <div class="a-name">${name}</div>
        ${vcnt?`<div class="a-sub" style="margin-top:3px;line-height:1.5">${vlinks}</div>`:''}
      </div>
    </div>
    <div class="a-body">
      ${briefSummary?`<div class="a-slbl">今日总结</div><div class="a-txt" style="background:var(--bg3);border-radius:6px;padding:10px 12px;border-left:2px solid var(--accent)">${esc(briefSummary)}</div>`:''}
      ${s.events?`<div class="a-slbl">今日重大财经事件</div><div class="a-txt">${esc(s.events.trim())}</div>`:''}
      ${s.market?`<div class="a-slbl">大盘与大类资产</div><div class="a-txt">${esc(s.market.trim())}</div>`:''}
      ${s.stocks?`<div class="a-slbl">个股分析</div><div class="a-txt">${esc(s.stocks.trim())}</div>`:''}
      ${pills?`<div class="a-slbl">标的观点</div><div class="a-vpills">${pills}</div>`:''}
      ${!briefSummary&&!s.events&&!s.market&&!s.stocks?`<div class="a-novid" style="color:var(--text3);font-family:var(--mono);font-size:11px">分析内容为空</div>`:''}
    </div>
  </div>`;
}

/* ── VOTE TABLE ── */
function renderVoteTable(channels, votes) {
  const thead = document.getElementById('voteThead');
  const tbody = document.getElementById('voteTbody');
  if (!channels || !votes) return;

  const bloggers = channels.map(ch => ({ name: ch.channelName || ch.handle, handle: ch.handle }));

  // 构建表头：标的 | 综合 | 博主1 | 博主2 | ...
  thead.innerHTML = '<tr>' +
    '<th>标的</th>' +
    '<th style="white-space:nowrap">综合结论</th>' +
    bloggers.map(b => `<th style="font-size:9px;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis" title="${b.name}">${b.name.slice(0,6)}${b.name.length>6?'…':''}</th>`).join('') +
  '</tr>';

  // 构建每行：每个标的 × 每个博主的投票
  tbody.innerHTML = SYMBOLS.map(sym => {
    // 从每个博主的 analysis.votes 里取该标的的投票
    const bloggerVotes = channels.map(ch => {
      const hasAnalysis = ch.analysis && ch.analysis.votes && !ch.analysis.noVideo && !ch.analysis.noCaption;
      const raw = hasAnalysis ? ch.analysis.votes[sym] : null;
      // 只接受明确的 A/B/C，其余一律 D
      const v = ['A','B','C'].includes((raw||'').toUpperCase()) ? raw.toUpperCase() : 'D';
      return v.toUpperCase();
    });

    // 汇总计票
    const tally = {A:0,B:0,C:0,D:0};
    bloggerVotes.forEach(v => { if(tally[v]!==undefined) tally[v]++; });

    // 综合结论：排除D后取最多票
    const nonD = ['A','B','C'].reduce((a,b) => tally[a]>=tally[b]?a:b);
    const verdict = tally[nonD] > 0 ? nonD : 'D';
    const vl={A:'看涨',B:'看跌',C:'观望',D:'未定'};

    const vColor = {A:'var(--vA)',B:'var(--vB)',C:'var(--vC)',D:'var(--vD)'};

    return `<tr>
      <td class="vsym">${symLabel(sym)}</td>
      <td><span class="vverdict ${verdict}">${vl[verdict]}<br><span style="font-size:9px;opacity:.7">A${tally.A}/B${tally.B}/C${tally.C}</span></span></td>
      ${bloggerVotes.map(v => `<td style="text-align:center"><span class="vpill ${v}" style="min-width:24px;font-size:10px;padding:2px 6px">${v}</span></td>`).join('')}
    </tr>`;
  }).join('');
}

      <button onclick="closeSettings()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px">✕</button>
    </div>

    <!-- 标的管理 -->
    <div style="margin-bottom:24px">
      <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:10px">📊 关注标的</div>
      <div id="symbolList" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px"></div>
      <div style="display:flex;gap:8px">
        <input id="newSymbol" placeholder="输入股票代码，如 AAPL" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text1);padding:7px 10px;font-family:var(--mono);font-size:12px;outline:none">
        <button onclick="addSymbol()" class="btn pri" style="padding:7px 14px">+ 添加</button>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">注：YINN/VXX/SVIX/SOXL/UGL 不支持期权墙计算</div>
    </div>

    <!-- 博主管理 -->
    <div style="margin-bottom:24px">
      <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:10px">📺 博主列表</div>
      <div id="bloggerList" style="max-height:280px;overflow-y:auto;margin-bottom:10px"></div>
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <input id="newBloggerId" placeholder="Channel ID (UCxxxxxxx)" style="flex:1.5;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text1);padding:7px 10px;font-family:var(--mono);font-size:11px;outline:none">
        <input id="newBloggerName" placeholder="显示名称" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text1);padding:7px 10px;font-size:12px;outline:none">
        <button onclick="addBlogger()" class="btn pri" style="padding:7px 14px">+ 添加</button>
      </div>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="closeSettings()" class="btn">取消</button>
      <button onclick="saveSettings()" class="btn pri">💾 保存配置</button>
    </div>
  </div>
</div>
</body>
</html>
